<!DOCTYPE HTML>
<html>
<head>
  <meta name="description" content="Personal Website">
  <meta name="author" content="Michael Kramer">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/bootstrap.css">
  <link rel="stylesheet" href="css/mpkramer.css">
  <script src="js/bootstrap.js"></script>
  <title>
    Michael P. Kramer
  </title>
</head>
<body>

<h1> Michael Kramer </h1>

<h2>
  Projects
</h2>

<div id="projectCarousel" class="carousel slide center-block" data-ride="carousel">
  <ol class="carousel-indicators">
    <li data-target="#projectCarousel" data-slide-to="0" class="active"></li>
    <li data-target="#projectCarousel" data-slide-to="1"></li>
    <li data-target="#projectCarousel" data-slide-to="2"></li>
  </ol>
  <div class="carousel-inner ">
    <div class="carousel-item active">
      <img class="d-block w-75 centered-block" src="imgs/firstProject.png" alt="First slide">
    </div>
    <div class="carousel-item">
      <img class="d-block w-75" src="imgs/secondProject.png" alt="Second slide">
    </div>
    <div class="carousel-item">
      <img class="d-block w-75" src="imgs/thirdProject.png" alt="Third slide">
    </div>
  </div>
  <a class="carousel-control-prev" href="#projectCarousel" role="button" data-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="sr-only">Previous</span>
  </a>
  <a class="carousel-control-next" href="#projectCarousel" role="button" data-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="sr-only">Next</span>
  </a>
</div>


  <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
  <!-- Include all compiled plugins (below), or include individual files as needed -->
  <script src="js/bootstrap.min.js"></script>
